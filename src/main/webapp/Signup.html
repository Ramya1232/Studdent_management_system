<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Management System - Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#fc4a1a);
}

.container{
    width:420px;
}

form{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.3);
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
    letter-spacing:1px;
}

label{
    display:block;
    color:#fff;
    font-weight:600;
    margin-top:12px;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.9);
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus{
    transform:scale(1.02);
    box-shadow:0 0 10px #ffffff;
}

button{
    width:100%;
    margin-top:25px;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#ffffff;
    color:#6a11cb;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ffd54f;
    color:#000;
    transform:translateY(-2px);
}

@media(max-width:500px){

.container{
    width:90%;
}

form{
    padding:25px;
}

}
</style>

</head>
<body>

<div class="container">

<form action="signup.jsp" method="post">

<h2>Student Signup</h2>

<label>Student ID</label>
<input type="number" name="id" value="1" required>

<label>Full Name</label>
<input type="text" name="name" value="meghana" required>

<label>Email Address</label>
<input type="email" name="email" value="meghana@gmail.com" required>

<label>Password</label>
<input type="password" name="password" value="meghana@123" required>

<label>Phone Number</label>
<input type="tel" name="number" value="54389284" required>

<label>Role</label>
<input type="text" name="role" value="student" required>

<button type="submit">Create Account</button>

</form>

</div>

</body>
</html>
